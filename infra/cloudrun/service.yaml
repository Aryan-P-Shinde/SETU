apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: solution-challenge-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containers:
        - image: gcr.io/YOUR_PROJECT_ID/solution-challenge-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: DEBUG
              value: "false"
            - name: FIREBASE_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: firebase-project-id
                  key: latest
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  key: latest
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret-key
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 512Mi